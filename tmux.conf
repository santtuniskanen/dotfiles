set-option -sa terminal-overrides ",xterm*:Tc"

set -g mouse on

unbind C-b
set-option -g prefix C-a
bind-key ? split-window -h -l 80 'zsh -c "glow -p ~/.dotfiles/.tmux-windows-panes-cheatsheet.md; exec zsh"'

set-option -g status-style "bg=default,fg=default"
set-option -g status-left "#[fg=colour6] #S #[fg=colour2]"
set-option -g status-right "#[fg=colour4]#(cd #{pane_current_path} && git branch --show-current 2>/dev/null | sed 's/.*/ &/')#[fg=colour9]#(cd #{pane_current_path} && [ -n \"\$(git status --short 2>/dev/null)\" ] && echo ' ±')#[fg=colour3]#(cd #{pane_current_path} && ahead=\$(git rev-list @{u}..HEAD 2>/dev/null | wc -l | tr -d ' '); behind=\$(git rev-list HEAD..@{u} 2>/dev/null | wc -l | tr -d ' '); [ \"\$ahead\" -gt 0 ] && echo \" ↑\$ahead\"; [ \"\$behind\" -gt 0 ] && echo \" ↓\$behind\")#[fg=colour3] %Y-%m-%d #[fg=colour9]%H:%M "
setw -g window-status-format " #[fg=colour8]#I:#W "
setw -g window-status-current-format "#[bg=colour10,fg=colour16] #I:#W #[default]"

set-option -g status-interval 5

bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"
set-option -g history-limit 10000
